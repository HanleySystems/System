<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>DJHan Warehouse Container Manager</title>
</head>
<body>
  <p>Opening <a href="yard1.html">DJHan Warehouse Container Manager</a>...</p>
  <script>
    const hashParams = new URLSearchParams(window.location.hash.slice(1));
    const queryParams = new URLSearchParams(window.location.search);
    const authType = hashParams.get('type') || queryParams.get('type');
    const isPasswordCallback =
      hashParams.has('access_token') ||
      queryParams.has('code') ||
      queryParams.has('token_hash') ||
      ['recovery', 'invite', 'signup'].includes(authType);

    if (isPasswordCallback) {
      window.location.replace(
        `set-password.html${window.location.search}${window.location.hash}`
      );
    } else {
      window.location.replace('yard1.html');
    }
  </script>
</body>
</html>
