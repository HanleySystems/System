<head>

</head>
<body>
  <p>Opening <a href="yard1.html">DJHan Warehouse Container Manager</a>...</p>
  <script>
    const isPasswordRecovery = new URLSearchParams(
      window.location.hash.slice(1)
    ).get('type') === 'recovery';

    if (isPasswordRecovery) {
      window.location.replace(`set-password.html${window.location.hash}`);
    } else {
      window.location.replace('yard1.html');
    }
  </script>
