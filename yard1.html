<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Newtown Yard Container Manager</title>
  <script src="theme.js"></script>
  <link rel="stylesheet" href="yard1.css?v=20260723-4">
</head>
<body>
  <main class="app">
    <section class="map-shell" aria-label="Warehouse grounds map">
      <div class="toolbar">
        <div class="title">
          <h1 id="yardTitle">Newtown Yard</h1>
          <span class="hint">Hover a container, click to edit</span>
        </div>
        <div id="yardTabs" class="yard-tabs" aria-label="Choose yard"></div>
        <div class="legend" aria-label="Status legend">
          <span><i class="swatch" style="background: var(--available)"></i>Available</span>
          <span><i class="swatch" style="background: var(--rented)"></i>Rented</span>
          <span><i class="swatch" style="background: var(--bad-debt)"></i>Bad debt</span>
          <span>10 / 20 / 40ft</span>
        </div>
        <div class="account">
          <span id="userEmail">Signed in</span>
          <button class="theme-toggle" type="button" data-theme-toggle aria-label="Use dark mode" title="Use dark mode">☾</button>
          <a id="adminLink" class="admin-link" href="admin.html" hidden>Admin</a>
          <button id="logoutButton" class="logout" type="button">Logout</button>
        </div>
      </div>

      <div class="active-yard">
        Current yard: <strong id="activeYardName">Newtown Yard</strong>
      </div>

      <div class="plan-frame">
        <div id="plan" class="plan">
          <img id="planImage" src="warehouse.png" alt="Newtown Yard layout" style="z-index: 0">
          <svg id="overlay" viewBox="0 0 4860 1800" role="img" aria-label="Interactive container positions" style="z-index: 2"></svg>
          <svg id="priorityOverlay" viewBox="0 0 4860 1800" aria-hidden="true"></svg>
        </div>
        <div id="containerTooltip" class="container-tooltip" role="tooltip" hidden>
          <strong></strong>
          <span></span>
        </div>
      </div>
    </section>

    <aside class="panel" aria-label="Container details">
      <div class="summary">
        <div class="metric"><strong id="availableCount">0</strong><span>Available</span></div>
        <div class="metric"><strong id="rentedCount">0</strong><span>Rented</span></div>
        <div class="metric"><strong id="badDebtCount">0</strong><span>Bad debt</span></div>
      </div>

      <form id="editor" class="editor">
        <p class="empty">Select a container on the map or from the list to update its customer and status.</p>
      </form>

      <div class="filters" aria-label="Filter containers">
        <input id="searchInput" type="search" placeholder="Search container or customer">
        <div class="filter-row">
          <select id="statusFilter" aria-label="Filter by status">
            <option value="all">All statuses</option>
            <option value="available">Available</option>
            <option value="rented">Rented</option>
            <option value="bad-debt">Bad debt</option>
          </select>
          <select id="sizeFilter" aria-label="Filter by size">
            <option value="all">All sizes</option>
            <option value="10">10ft</option>
            <option value="20">20ft</option>
            <option value="40">40ft</option>
          </select>
        </div>
      </div>

      <div id="containerList" class="list" aria-label="Container list"></div>
    </aside>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="yard1-supabase.js?v=20260723-4"></script>
</body>
</html>
