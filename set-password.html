<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Choose Password</title>
  <script src="theme.js"></script>
  <link rel="stylesheet" href="login.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
  <button class="theme-toggle page-theme-toggle" type="button" data-theme-toggle aria-label="Use dark mode" title="Use dark mode">☾</button>
  <main class="login-page">
    <section class="login-card" aria-label="Choose a password">
      <div class="brand">
        <p>Hanley Systems</p>
        <h1>Choose your password</h1>
      </div>

      <form id="passwordForm" class="login-form">
        <label for="password">New password</label>
        <input id="password" type="password" autocomplete="new-password" minlength="10" required>

        <label for="confirmPassword">Confirm password</label>
        <input id="confirmPassword" type="password" autocomplete="new-password" minlength="10" required>

        <button id="submitButton" type="submit">Set password</button>
        <p id="message" class="message" aria-live="polite">Checking your secure link...</p>
      </form>
    </section>
  </main>

  <script src="set-password.js"></script>
</body>
</html>
